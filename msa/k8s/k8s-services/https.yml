apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: my-issuer
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: rklt12@naver.com
    privateKeySecretRef:
      name: my-issuer
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: server-8way-click-tls
  namespace: soldesk
spec:
  secretName: server-8way-click-tls
  duration: 2160h # 90day
  renewBefore: 360h # before 15day
  issuerRef:
    name: my-issuer
    kind: ClusterIssuer
  commonName: server.8way.click
  dnsNames:
    - server.8way.click
